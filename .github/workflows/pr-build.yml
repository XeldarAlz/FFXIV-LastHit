name: PR Builder for PvpAutoLb

on:
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: windows-2022

    env:
      Solution_Name: PvpAutoLb

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Download Dalamud
      # Track staging while API 15 / Patch 7.50 is in beta — release channel is
      # still API 14 and won't satisfy ECommons master. Revert to /latest.zip
      # once Dalamud 15 GAs.
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: Store artifacts
      uses: actions/upload-artifact@v7
      with:
        name: PvpAutoLb
        path: .\PvpAutoLb\bin\x64\Release\PvpAutoLb\*
        if-no-files-found: error
        retention-days: 1
